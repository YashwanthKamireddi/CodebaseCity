<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Cinematic dark gradient -->
    <linearGradient id="skyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030308"/>
      <stop offset="30%" stop-color="#080812"/>
      <stop offset="60%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#0f0f22"/>
    </linearGradient>

    <!-- Building face gradients -->
    <linearGradient id="bRight1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e38"/>
      <stop offset="100%" stop-color="#0f0f22"/>
    </linearGradient>
    <linearGradient id="bRight2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222248"/>
      <stop offset="100%" stop-color="#121230"/>
    </linearGradient>
    <linearGradient id="bRight3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#282860"/>
      <stop offset="100%" stop-color="#141438"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a65"/>
      <stop offset="100%" stop-color="#141440"/>
    </linearGradient>

    <!-- Accent gradients -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e0e0ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <!-- Stars pattern -->
    <pattern id="stars" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="20" r="0.5" fill="#fff" opacity="0.3"/>
      <circle cx="50" cy="10" r="0.4" fill="#fff" opacity="0.2"/>
      <circle cx="80" cy="40" r="0.6" fill="#fff" opacity="0.25"/>
      <circle cx="30" cy="70" r="0.4" fill="#fff" opacity="0.15"/>
      <circle cx="90" cy="85" r="0.5" fill="#fff" opacity="0.2"/>
      <circle cx="60" cy="55" r="0.3" fill="#fff" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#skyBg)"/>

  <!-- Stars -->
  <rect width="1200" height="400" fill="url(#stars)" opacity="0.5"/>

  <!-- Atmospheric glow behind city -->
  <ellipse cx="600" cy="520" rx="500" ry="150" fill="url(#accent)" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Ground reflection -->
  <ellipse cx="600" cy="550" rx="450" ry="40" fill="url(#accent)" opacity="0.15" filter="url(#bigGlow)"/>

  <!-- Grid floor -->
  <g opacity="0.08" stroke="url(#accent)" stroke-width="0.5">
    <line x1="100" y1="580" x2="300" y2="530"/>
    <line x1="200" y1="580" x2="400" y2="530"/>
    <line x1="300" y1="580" x2="500" y2="530"/>
    <line x1="400" y1="580" x2="600" y2="530"/>
    <line x1="500" y1="580" x2="700" y2="530"/>
    <line x1="600" y1="580" x2="800" y2="530"/>
    <line x1="700" y1="580" x2="900" y2="530"/>
    <line x1="800" y1="580" x2="1000" y2="530"/>
    <line x1="900" y1="580" x2="1100" y2="530"/>
  </g>

  <!-- ISOMETRIC CITY SKYLINE -->

  <!-- Building 1 (far left) -->
  <g transform="translate(60, 340)">
    <polygon points="40,0 80,20 40,40 0,20" fill="#252545"/>
    <polygon points="80,20 80,160 40,180 40,40" fill="url(#bRight1)"/>
    <polygon points="0,20 40,40 40,180 0,160" fill="#0c0c1a"/>
    <rect x="48" y="55" width="18" height="14" fill="#00d9ff" opacity="0.2"/>
    <rect x="48" y="80" width="18" height="14" fill="#a855f7" opacity="0.15"/>
    <rect x="48" y="105" width="18" height="14" fill="#fff" opacity="0.1"/>
  </g>

  <!-- Building 2 -->
  <g transform="translate(160, 280)">
    <polygon points="45,0 90,22 45,45 0,22" fill="#2a2a50"/>
    <polygon points="90,22 90,220 45,242 45,45" fill="url(#bRight2)"/>
    <polygon points="0,22 45,45 45,242 0,220" fill="#0a0a1d"/>
    <polygon points="45,0 90,22 45,45 0,22" fill="url(#accent)" opacity="0.2" filter="url(#glow)"/>
    <rect x="52" y="60" width="22" height="16" fill="#00d9ff" opacity="0.35"/>
    <rect x="52" y="90" width="22" height="16" fill="#fff" opacity="0.2"/>
    <rect x="52" y="120" width="22" height="16" fill="#6366f1" opacity="0.25"/>
    <rect x="52" y="150" width="22" height="16" fill="#00d9ff" opacity="0.18"/>
    <rect x="52" y="180" width="22" height="16" fill="#a855f7" opacity="0.12"/>
  </g>

  <!-- Building 3 -->
  <g transform="translate(280, 310)">
    <polygon points="35,0 70,17 35,35 0,17" fill="#222240"/>
    <polygon points="70,17 70,180 35,197 35,35" fill="url(#bRight1)"/>
    <polygon points="0,17 35,35 35,197 0,180" fill="#080815"/>
    <rect x="42" y="50" width="16" height="12" fill="#a855f7" opacity="0.25"/>
    <rect x="42" y="75" width="16" height="12" fill="#00d9ff" opacity="0.2"/>
    <rect x="42" y="100" width="16" height="12" fill="#fff" opacity="0.12"/>
  </g>

  <!-- Building 4 -->
  <g transform="translate(360, 250)">
    <polygon points="50,0 100,25 50,50 0,25" fill="#2d2d58"/>
    <polygon points="100,25 100,260 50,285 50,50" fill="url(#bRight2)"/>
    <polygon points="0,25 50,50 50,285 0,260" fill="#0b0b1f"/>
    <polygon points="50,0 100,25 50,50 0,25" fill="url(#accent)" opacity="0.25" filter="url(#glow)"/>
    <rect x="58" y="70" width="25" height="18" fill="#00d9ff" opacity="0.4"/>
    <rect x="58" y="105" width="25" height="18" fill="#fff" opacity="0.25"/>
    <rect x="58" y="140" width="25" height="18" fill="#a855f7" opacity="0.3"/>
    <rect x="58" y="175" width="25" height="18" fill="#6366f1" opacity="0.2"/>
    <rect x="58" y="210" width="25" height="18" fill="#00d9ff" opacity="0.15"/>
  </g>

  <!-- HERO BUILDING (center) -->
  <g transform="translate(500, 100)">
    <polygon points="65,0 130,32 65,65 0,32" fill="#3a3a70"/>
    <polygon points="130,32 130,400 65,432 65,65" fill="url(#heroGrad)"/>
    <polygon points="0,32 65,65 65,432 0,400" fill="#0a0a22"/>

    <!-- Beacon roof glow -->
    <polygon points="65,0 130,32 65,65 0,32" fill="url(#accent)" opacity="0.45" filter="url(#bigGlow)"/>

    <!-- Antenna -->
    <line x1="65" y1="0" x2="65" y2="-50" stroke="url(#accentV)" stroke-width="4"/>
    <circle cx="65" cy="-60" r="10" fill="#00d9ff" filter="url(#bigGlow)"/>
    <circle cx="65" cy="-60" r="5" fill="#fff"/>

    <!-- Windows grid - right side -->
    <g>
      <rect x="75" y="85" width="35" height="22" fill="#00d9ff" opacity="0.6"/>
      <rect x="75" y="125" width="35" height="22" fill="#fff" opacity="0.35"/>
      <rect x="75" y="165" width="35" height="22" fill="#a855f7" opacity="0.45"/>
      <rect x="75" y="205" width="35" height="22" fill="#6366f1" opacity="0.35"/>
      <rect x="75" y="245" width="35" height="22" fill="#00d9ff" opacity="0.3"/>
      <rect x="75" y="285" width="35" height="22" fill="#fff" opacity="0.2"/>
      <rect x="75" y="325" width="35" height="22" fill="#a855f7" opacity="0.15"/>
      <rect x="75" y="365" width="35" height="22" fill="#00d9ff" opacity="0.1"/>
    </g>
    <!-- Windows - left side -->
    <g opacity="0.5">
      <rect x="20" y="90" width="28" height="18" fill="#00d9ff" opacity="0.4"/>
      <rect x="20" y="130" width="28" height="18" fill="#a855f7" opacity="0.3"/>
      <rect x="20" y="170" width="28" height="18" fill="#fff" opacity="0.2"/>
      <rect x="20" y="210" width="28" height="18" fill="#6366f1" opacity="0.25"/>
      <rect x="20" y="250" width="28" height="18" fill="#00d9ff" opacity="0.2"/>
    </g>
  </g>

  <!-- Building 6 -->
  <g transform="translate(680, 240)">
    <polygon points="50,0 100,25 50,50 0,25" fill="#2a2a55"/>
    <polygon points="100,25 100,270 50,295 50,50" fill="url(#bRight3)"/>
    <polygon points="0,25 50,50 50,295 0,270" fill="#0a0a1c"/>
    <polygon points="50,0 100,25 50,50 0,25" fill="url(#accent)" opacity="0.22" filter="url(#glow)"/>
    <rect x="58" y="68" width="25" height="18" fill="#a855f7" opacity="0.35"/>
    <rect x="58" y="102" width="25" height="18" fill="#00d9ff" opacity="0.28"/>
    <rect x="58" y="136" width="25" height="18" fill="#fff" opacity="0.2"/>
    <rect x="58" y="170" width="25" height="18" fill="#6366f1" opacity="0.22"/>
    <rect x="58" y="204" width="25" height="18" fill="#00d9ff" opacity="0.15"/>
  </g>

  <!-- Building 7 -->
  <g transform="translate(800, 300)">
    <polygon points="40,0 80,20 40,40 0,20" fill="#252548"/>
    <polygon points="80,20 80,200 40,220 40,40" fill="url(#bRight2)"/>
    <polygon points="0,20 40,40 40,220 0,200" fill="#090918"/>
    <rect x="48" y="58" width="18" height="14" fill="#00d9ff" opacity="0.25"/>
    <rect x="48" y="88" width="18" height="14" fill="#a855f7" opacity="0.2"/>
    <rect x="48" y="118" width="18" height="14" fill="#fff" opacity="0.15"/>
    <rect x="48" y="148" width="18" height="14" fill="#6366f1" opacity="0.12"/>
  </g>

  <!-- Building 8 -->
  <g transform="translate(900, 260)">
    <polygon points="45,0 90,22 45,45 0,22" fill="#282852"/>
    <polygon points="90,22 90,250 45,272 45,45" fill="url(#bRight1)"/>
    <polygon points="0,22 45,45 45,272 0,250" fill="#080816"/>
    <polygon points="45,0 90,22 45,45 0,22" fill="url(#accent)" opacity="0.18" filter="url(#glow)"/>
    <rect x="52" y="62" width="22" height="16" fill="#00d9ff" opacity="0.3"/>
    <rect x="52" y="95" width="22" height="16" fill="#fff" opacity="0.18"/>
    <rect x="52" y="128" width="22" height="16" fill="#a855f7" opacity="0.22"/>
    <rect x="52" y="161" width="22" height="16" fill="#6366f1" opacity="0.15"/>
    <rect x="52" y="194" width="22" height="16" fill="#00d9ff" opacity="0.1"/>
  </g>

  <!-- Building 9 (far right) -->
  <g transform="translate(1020, 330)">
    <polygon points="35,0 70,17 35,35 0,17" fill="#222242"/>
    <polygon points="70,17 70,175 35,192 35,35" fill="url(#bRight1)"/>
    <polygon points="0,17 35,35 35,192 0,175" fill="#070714"/>
    <rect x="42" y="50" width="16" height="12" fill="#a855f7" opacity="0.2"/>
    <rect x="42" y="78" width="16" height="12" fill="#00d9ff" opacity="0.15"/>
    <rect x="42" y="106" width="16" height="12" fill="#fff" opacity="0.1"/>
  </g>

  <!-- Small building far right -->
  <g transform="translate(1100, 400)">
    <polygon points="25,0 50,12 25,25 0,12" fill="#1e1e3a"/>
    <polygon points="50,12 50,105 25,117 25,25" fill="url(#bRight1)"/>
    <polygon points="0,12 25,25 25,117 0,105" fill="#060612"/>
    <rect x="30" y="38" width="12" height="10" fill="#00d9ff" opacity="0.18"/>
    <rect x="30" y="60" width="12" height="10" fill="#a855f7" opacity="0.12"/>
  </g>

  <!-- Floating data particles -->
  <g filter="url(#glow)">
    <circle cx="150" cy="150" r="3" fill="#00d9ff" opacity="0.5"/>
    <circle cx="1050" cy="120" r="2.5" fill="#a855f7" opacity="0.45"/>
    <circle cx="320" cy="200" r="2" fill="#6366f1" opacity="0.4"/>
    <circle cx="950" cy="180" r="2.8" fill="#00d9ff" opacity="0.35"/>
    <circle cx="200" cy="450" r="2" fill="#a855f7" opacity="0.3"/>
    <circle cx="1000" cy="420" r="2.2" fill="#00d9ff" opacity="0.35"/>
  </g>

  <!-- TITLE -->
  <text x="600" y="75" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="700" fill="url(#textGrad)" filter="url(#textGlow)" letter-spacing="8">CODEBASE CITY</text>

  <!-- Tagline -->
  <text x="600" y="610" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#8888aa" letter-spacing="4" opacity="0.8">VISUALIZE YOUR CODEBASE IN 3D</text>
</svg>
