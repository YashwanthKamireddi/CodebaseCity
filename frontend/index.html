<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Code City — Visualize any GitHub repo or local codebase as a living 3D city. See file sizes, complexity hotspots, and git history at a glance." />
    <meta name="theme-color" content="#0c0d12" />

    <!-- Mobile Web App Capabilities -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Code City" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Code City — 3D Codebase Visualization" />
    <meta property="og:description" content="Turn any GitHub repo into a living 3D city. Explore file structures, complexity hotspots, git history, and architecture — all in your browser." />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Code City — 3D Codebase Visualization" />
    <meta name="twitter:description" content="Turn any GitHub repo into a living 3D city. Explore file structures, complexity hotspots, and git history." />
    <meta name="twitter:image" content="/og-image.svg" />

    <title>Code City</title>

    <!-- Fonts: single source of truth (not duplicated in CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- No-JS fallback -->
    <noscript><style>body::after{content:"Code City requires JavaScript.";display:flex;align-items:center;justify-content:center;position:fixed;inset:0;background:#0c0d12;color:#fff;font:1.2rem/1.5 system-ui;}</style></noscript>
  </head>
  <body style="background:#0c0d12">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
