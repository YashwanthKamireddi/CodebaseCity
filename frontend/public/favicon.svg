<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#060608"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Ground line -->
  <line x1="4" y1="27.5" x2="28" y2="27.5" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Building 1 — short -->
  <rect x="5" y="21" width="5" height="6.5" rx="0.5" fill="#0e0e12" stroke="#ffffff" stroke-width="0.6" opacity="0.35"/>

  <!-- Building 2 — medium -->
  <rect x="12" y="14" width="5.5" height="13.5" rx="0.5" fill="#0e0e12" stroke="#ffffff" stroke-width="0.7" opacity="0.55"/>
  <rect x="13.2" y="16.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.2"/>
  <rect x="15.2" y="16.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.12"/>
  <rect x="13.2" y="19.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.15"/>

  <!-- Building 3 — tallest -->
  <rect x="19.5" y="7" width="7" height="20.5" rx="0.5" fill="#0e0e12" stroke="#ffffff" stroke-width="0.9" opacity="0.75"/>
  <rect x="19.5" y="7" width="7" height="1.8" rx="0.4" fill="#ffffff" opacity="0.35" filter="url(#glow)"/>
  <rect x="21" y="10.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.3"/>
  <rect x="23.5" y="10.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.18"/>
  <rect x="21" y="13.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.25"/>
  <rect x="23.5" y="13.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.12"/>
  <rect x="21" y="16.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.2"/>
  <rect x="23.5" y="19.5" width="1.3" height="1.3" rx="0.2" fill="#ffffff" opacity="0.15"/>

  <!-- Antenna dot -->
  <circle cx="23" cy="5.5" r="1" fill="#ffffff" opacity="0.7" filter="url(#glow)"/>
</svg>
