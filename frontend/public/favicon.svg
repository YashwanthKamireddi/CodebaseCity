<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Premium dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    
    <!-- Isometric building gradients -->
    <linearGradient id="building1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="building2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="building3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Accent color gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern (code representation) -->
  <g opacity="0.03">
    <line x1="8" y1="0" x2="8" y2="32" stroke="#fff" stroke-width="0.3"/>
    <line x1="16" y1="0" x2="16" y2="32" stroke="#fff" stroke-width="0.3"/>
    <line x1="24" y1="0" x2="24" y2="32" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="8" x2="32" y2="8" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="16" x2="32" y2="16" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="24" x2="32" y2="24" stroke="#fff" stroke-width="0.3"/>
  </g>

  <!-- ISOMETRIC 3D BUILDINGS -->
  
  <!-- Building 1 (left, short) - Isometric -->
  <g transform="translate(4, 17)">
    <!-- Top face -->
    <polygon points="4,0 8,2 4,4 0,2" fill="#2a2a4a"/>
    <!-- Right face -->
    <polygon points="8,2 8,10 4,12 4,4" fill="url(#building1)"/>
    <!-- Left face -->
    <polygon points="0,2 4,4 4,12 0,10" fill="#151528"/>
    <!-- Window glow -->
    <rect x="5" y="5" width="1.5" height="1.5" fill="#00d9ff" opacity="0.4"/>
    <rect x="5" y="7.5" width="1.5" height="1.5" fill="#00d9ff" opacity="0.2"/>
  </g>
  
  <!-- Building 2 (center, medium) - Isometric -->
  <g transform="translate(10, 10)">
    <!-- Top face -->
    <polygon points="5,0 10,2.5 5,5 0,2.5" fill="#2a2a5a"/>
    <!-- Right face -->
    <polygon points="10,2.5 10,16 5,18.5 5,5" fill="url(#building2)"/>
    <!-- Left face -->
    <polygon points="0,2.5 5,5 5,18.5 0,16" fill="#12122a"/>
    <!-- Rooftop accent -->
    <polygon points="5,0 10,2.5 5,5 0,2.5" fill="url(#accent)" opacity="0.3" filter="url(#glow)"/>
    <!-- Windows -->
    <rect x="6" y="7" width="2" height="2" fill="#00d9ff" opacity="0.5"/>
    <rect x="6" y="10.5" width="2" height="2" fill="#a855f7" opacity="0.3"/>
    <rect x="6" y="14" width="2" height="2" fill="#00d9ff" opacity="0.2"/>
  </g>
  
  <!-- Building 3 (right, tallest) - Isometric Hero -->
  <g transform="translate(18, 4)">
    <!-- Top face -->
    <polygon points="5,0 10,2.5 5,5 0,2.5" fill="#3a3a6a"/>
    <!-- Right face -->
    <polygon points="10,2.5 10,22 5,24.5 5,5" fill="url(#building3)"/>
    <!-- Left face -->
    <polygon points="0,2.5 5,5 5,24.5 0,22" fill="#0f0f25"/>
    <!-- Rooftop beacon -->
    <polygon points="5,0 10,2.5 5,5 0,2.5" fill="url(#accent)" opacity="0.5" filter="url(#glow)"/>
    <!-- Antenna -->
    <line x1="5" y1="0" x2="5" y2="-2" stroke="url(#accent)" stroke-width="0.8" opacity="0.6"/>
    <circle cx="5" cy="-2.5" r="1" fill="#00d9ff" filter="url(#glow)"/>
    <!-- Windows grid -->
    <rect x="6" y="7" width="2" height="1.5" fill="#00d9ff" opacity="0.6"/>
    <rect x="6" y="9.5" width="2" height="1.5" fill="#fff" opacity="0.3"/>
    <rect x="6" y="12" width="2" height="1.5" fill="#a855f7" opacity="0.4"/>
    <rect x="6" y="14.5" width="2" height="1.5" fill="#00d9ff" opacity="0.3"/>
    <rect x="6" y="17" width="2" height="1.5" fill="#fff" opacity="0.2"/>
    <rect x="6" y="19.5" width="2" height="1.5" fill="#00d9ff" opacity="0.15"/>
  </g>
  
  <!-- Ground reflection/glow -->
  <ellipse cx="16" cy="29" rx="10" ry="2" fill="url(#accent)" opacity="0.15" filter="url(#softGlow)"/>
</svg>
