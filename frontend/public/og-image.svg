<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#060608"/>
    </linearGradient>
    <radialGradient id="cityGlow" cx="50%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="510" rx="420" ry="120" fill="url(#cityGlow)"/>

  <!-- Ground line -->
  <line x1="120" y1="480" x2="1080" y2="480" stroke="#ffffff" stroke-width="0.8" opacity="0.06"/>

  <!-- Buildings — ascending skyline, white/silver strokes -->
  <rect x="130" y="370" width="55" height="110" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.2" opacity="0.3"/>
  <rect x="140" y="382" width="8" height="8" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="153" y="382" width="8" height="8" rx="1" fill="#ffffff" opacity="0.08"/>

  <rect x="205" y="300" width="65" height="180" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.3" opacity="0.45"/>
  <rect x="205" y="300" width="65" height="6" rx="2" fill="#ffffff" opacity="0.15" filter="url(#glow)"/>
  <rect x="215" y="318" width="9" height="9" rx="1" fill="#ffffff" opacity="0.18"/>
  <rect x="236" y="318" width="9" height="9" rx="1" fill="#ffffff" opacity="0.10"/>
  <rect x="215" y="340" width="9" height="9" rx="1" fill="#ffffff" opacity="0.14"/>

  <rect x="295" y="238" width="72" height="242" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.5" opacity="0.55"/>
  <rect x="295" y="238" width="72" height="7" rx="2" fill="#ffffff" opacity="0.2" filter="url(#glow)"/>
  <rect x="307" y="258" width="10" height="10" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="327" y="258" width="10" height="10" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="307" y="280" width="10" height="10" rx="1" fill="#ffffff" opacity="0.16"/>

  <!-- Tallest center -->
  <rect x="395" y="140" width="88" height="340" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.8" opacity="0.75"/>
  <rect x="395" y="140" width="88" height="8" rx="2" fill="#ffffff" opacity="0.3" filter="url(#glow)"/>
  <line x1="439" y1="140" x2="439" y2="115" stroke="#ffffff" stroke-width="2" opacity="0.25"/>
  <circle cx="439" cy="110" r="5" fill="#ffffff" opacity="0.5" filter="url(#glow)"/>
  <rect x="408" y="160" width="11" height="11" rx="1" fill="#ffffff" opacity="0.25"/>
  <rect x="428" y="160" width="11" height="11" rx="1" fill="#ffffff" opacity="0.14"/>
  <rect x="455" y="160" width="11" height="11" rx="1" fill="#ffffff" opacity="0.10"/>
  <rect x="408" y="185" width="11" height="11" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="428" y="185" width="11" height="11" rx="1" fill="#ffffff" opacity="0.10"/>
  <rect x="408" y="210" width="11" height="11" rx="1" fill="#ffffff" opacity="0.16"/>
  <rect x="455" y="210" width="11" height="11" rx="1" fill="#ffffff" opacity="0.12"/>

  <rect x="510" y="200" width="78" height="280" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <rect x="510" y="200" width="78" height="6" rx="2" fill="#ffffff" opacity="0.22" filter="url(#glow)"/>

  <rect x="618" y="270" width="62" height="210" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>

  <rect x="708" y="182" width="76" height="298" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <rect x="708" y="182" width="76" height="6" rx="2" fill="#ffffff" opacity="0.2" filter="url(#glow)"/>

  <rect x="812" y="248" width="58" height="232" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.2" opacity="0.5"/>

  <rect x="898" y="318" width="48" height="162" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1" opacity="0.35"/>

  <rect x="974" y="365" width="38" height="115" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="0.8" opacity="0.25"/>

  <!-- Title -->
  <text x="600" y="560" text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="48" font-weight="700" letter-spacing="-1.5"
    fill="#ffffff"
    opacity="0.9">Code City</text>

  <!-- Tagline -->
  <text x="600" y="598" text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="16" font-weight="400" letter-spacing="3"
    fill="#ffffff" opacity="0.25"
    text-transform="uppercase">VISUALIZE YOUR CODEBASE IN 3D</text>
</svg>
