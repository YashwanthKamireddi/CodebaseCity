<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#060608"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Ground line -->
  <line x1="22" y1="155" x2="158" y2="155" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- Building 1 — short -->
  <rect x="24" y="118" width="28" height="37" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
  <rect x="29" y="124" width="7" height="7" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="40" y="124" width="7" height="7" rx="1" fill="#ffffff" opacity="0.10"/>
  <rect x="29" y="136" width="7" height="7" rx="1" fill="#ffffff" opacity="0.12"/>

  <!-- Building 2 — medium -->
  <rect x="64" y="80" width="32" height="75" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.5" opacity="0.55"/>
  <rect x="64" y="80" width="32" height="6" rx="2" fill="#ffffff" opacity="0.2" filter="url(#glow)"/>
  <rect x="69" y="93" width="8" height="8" rx="1" fill="#ffffff" opacity="0.22"/>
  <rect x="83" y="93" width="8" height="8" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="69" y="108" width="8" height="8" rx="1" fill="#ffffff" opacity="0.18"/>
  <rect x="83" y="122" width="8" height="8" rx="1" fill="#ffffff" opacity="0.10"/>

  <!-- Building 3 — tallest -->
  <rect x="112" y="38" width="37" height="117" rx="2" fill="#0e0e12" stroke="#ffffff" stroke-width="1.8" opacity="0.75"/>
  <rect x="112" y="38" width="37" height="8" rx="2" fill="#ffffff" opacity="0.35" filter="url(#glow)"/>
  <!-- Antenna -->
  <line x1="130.5" y1="38" x2="130.5" y2="26" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="130.5" cy="23" r="3.5" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
  <!-- Windows -->
  <rect x="117" y="55" width="8" height="8" rx="1" fill="#ffffff" opacity="0.28"/>
  <rect x="132" y="55" width="8" height="8" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="117" y="70" width="8" height="8" rx="1" fill="#ffffff" opacity="0.22"/>
  <rect x="132" y="70" width="8" height="8" rx="1" fill="#ffffff" opacity="0.10"/>
  <rect x="117" y="85" width="8" height="8" rx="1" fill="#ffffff" opacity="0.18"/>
  <rect x="132" y="100" width="8" height="8" rx="1" fill="#ffffff" opacity="0.14"/>
  <rect x="117" y="115" width="8" height="8" rx="1" fill="#ffffff" opacity="0.10"/>
</svg>
