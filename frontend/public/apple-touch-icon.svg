<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <!-- Premium dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="30%" stop-color="#0a0a14"/>
      <stop offset="70%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    
    <!-- Isometric building gradients -->
    <linearGradient id="b1Right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e35"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="b2Right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a40"/>
      <stop offset="100%" stop-color="#0f0f28"/>
    </linearGradient>
    <linearGradient id="b3Right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1f4a"/>
      <stop offset="100%" stop-color="#0d0d25"/>
    </linearGradient>
    <linearGradient id="heroRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252560"/>
      <stop offset="100%" stop-color="#101030"/>
    </linearGradient>
    
    <!-- Accent gradients -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accentVertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Window glow -->
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  
  <!-- Subtle circuit grid pattern -->
  <g opacity="0.025" stroke="#fff" stroke-width="0.5">
    <line x1="45" y1="0" x2="45" y2="180"/>
    <line x1="90" y1="0" x2="90" y2="180"/>
    <line x1="135" y1="0" x2="135" y2="180"/>
    <line x1="0" y1="45" x2="180" y2="45"/>
    <line x1="0" y1="90" x2="180" y2="90"/>
    <line x1="0" y1="135" x2="180" y2="135"/>
  </g>

  <!-- Ground glow -->
  <ellipse cx="90" cy="160" rx="65" ry="15" fill="url(#accent)" opacity="0.12" filter="url(#softGlow)"/>
  
  <!-- ISOMETRIC 3D CITY -->
  
  <!-- Building 1 (far left, short) -->
  <g transform="translate(18, 105)">
    <polygon points="20,0 40,10 20,20 0,10" fill="#2a2a4a"/>
    <polygon points="40,10 40,45 20,55 20,20" fill="url(#b1Right)"/>
    <polygon points="0,10 20,20 20,55 0,45" fill="#101025"/>
    <!-- Windows -->
    <rect x="25" y="25" width="8" height="6" fill="#00d9ff" opacity="0.25"/>
    <rect x="25" y="36" width="8" height="6" fill="#6366f1" opacity="0.15"/>
  </g>
  
  <!-- Building 2 (left-center, medium) -->
  <g transform="translate(48, 68)">
    <polygon points="22,0 44,11 22,22 0,11" fill="#2a2a55"/>
    <polygon points="44,11 44,80 22,91 22,22" fill="url(#b2Right)"/>
    <polygon points="0,11 22,22 22,91 0,80" fill="#0d0d22"/>
    <!-- Rooftop glow -->
    <polygon points="22,0 44,11 22,22 0,11" fill="url(#accent)" opacity="0.25" filter="url(#glow)"/>
    <!-- Windows -->
    <rect x="28" y="30" width="9" height="7" fill="#00d9ff" opacity="0.4"/>
    <rect x="28" y="42" width="9" height="7" fill="#fff" opacity="0.2"/>
    <rect x="28" y="54" width="9" height="7" fill="#a855f7" opacity="0.25"/>
    <rect x="28" y="66" width="9" height="7" fill="#00d9ff" opacity="0.15"/>
  </g>
  
  <!-- HERO BUILDING (center, tallest) -->
  <g transform="translate(82, 22)">
    <polygon points="25,0 50,12.5 25,25 0,12.5" fill="#3a3a6a"/>
    <polygon points="50,12.5 50,125 25,137.5 25,25" fill="url(#heroRight)"/>
    <polygon points="0,12.5 25,25 25,137.5 0,125" fill="#0a0a20"/>
    
    <!-- Rooftop beacon effect -->
    <polygon points="25,0 50,12.5 25,25 0,12.5" fill="url(#accent)" opacity="0.4" filter="url(#strongGlow)"/>
    
    <!-- Antenna spire -->
    <line x1="25" y1="0" x2="25" y2="-15" stroke="url(#accentVertical)" stroke-width="2.5"/>
    <circle cx="25" cy="-18" r="4" fill="#00d9ff" filter="url(#strongGlow)"/>
    <circle cx="25" cy="-18" r="2" fill="#fff"/>
    
    <!-- Windows grid - right face -->
    <g>
      <rect x="30" y="35" width="12" height="8" fill="#00d9ff" opacity="0.6"/>
      <rect x="30" y="48" width="12" height="8" fill="#fff" opacity="0.3"/>
      <rect x="30" y="61" width="12" height="8" fill="#a855f7" opacity="0.45"/>
      <rect x="30" y="74" width="12" height="8" fill="#00d9ff" opacity="0.35"/>
      <rect x="30" y="87" width="12" height="8" fill="#6366f1" opacity="0.25"/>
      <rect x="30" y="100" width="12" height="8" fill="#00d9ff" opacity="0.2"/>
      <rect x="30" y="113" width="12" height="8" fill="#fff" opacity="0.1"/>
    </g>
    <!-- Windows - left face (darker) -->
    <g opacity="0.5">
      <rect x="8" y="38" width="10" height="7" fill="#00d9ff" opacity="0.4"/>
      <rect x="8" y="52" width="10" height="7" fill="#a855f7" opacity="0.3"/>
      <rect x="8" y="66" width="10" height="7" fill="#00d9ff" opacity="0.25"/>
      <rect x="8" y="80" width="10" height="7" fill="#fff" opacity="0.15"/>
    </g>
  </g>
  
  <!-- Building 4 (right-center, medium-tall) -->
  <g transform="translate(120, 55)">
    <polygon points="20,0 40,10 20,20 0,10" fill="#2a2a50"/>
    <polygon points="40,10 40,95 20,105 20,20" fill="url(#b3Right)"/>
    <polygon points="0,10 20,20 20,105 0,95" fill="#0a0a1e"/>
    <!-- Rooftop -->
    <polygon points="20,0 40,10 20,20 0,10" fill="url(#accent)" opacity="0.2" filter="url(#glow)"/>
    <!-- Windows -->
    <rect x="25" y="30" width="9" height="7" fill="#a855f7" opacity="0.35"/>
    <rect x="25" y="44" width="9" height="7" fill="#00d9ff" opacity="0.25"/>
    <rect x="25" y="58" width="9" height="7" fill="#fff" opacity="0.15"/>
    <rect x="25" y="72" width="9" height="7" fill="#6366f1" opacity="0.2"/>
  </g>
  
  <!-- Building 5 (far right, short) -->
  <g transform="translate(145, 100)">
    <polygon points="15,0 30,7.5 15,15 0,7.5" fill="#252545"/>
    <polygon points="30,7.5 30,50 15,57.5 15,15" fill="url(#b1Right)"/>
    <polygon points="0,7.5 15,15 15,57.5 0,50" fill="#0e0e20"/>
    <!-- Windows -->
    <rect x="18" y="22" width="7" height="5" fill="#00d9ff" opacity="0.2"/>
    <rect x="18" y="32" width="7" height="5" fill="#a855f7" opacity="0.15"/>
  </g>
  
  <!-- Floating data particles -->
  <g filter="url(#glow)">
    <circle cx="35" cy="45" r="1.5" fill="#00d9ff" opacity="0.6"/>
    <circle cx="155" cy="38" r="1.2" fill="#a855f7" opacity="0.5"/>
    <circle cx="50" cy="155" r="1" fill="#6366f1" opacity="0.4"/>
    <circle cx="140" cy="148" r="1.3" fill="#00d9ff" opacity="0.45"/>
  </g>
</svg>
